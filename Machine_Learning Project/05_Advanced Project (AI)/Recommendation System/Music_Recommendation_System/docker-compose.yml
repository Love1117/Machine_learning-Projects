version: '3.9'

services:

  fastapi:

    build: ./app

    container_name: music_api

    ports:
      - "8000:8000"

    env_file:
      - ./app/.env

    volumes:
      - ./app:/app

  streamlit:

    build: ./app

    container_name: music_streamlit

    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0

    ports:
      - "8501:8501"

    env_file:
      - ./app/.env

    depends_on:
      - fastapi