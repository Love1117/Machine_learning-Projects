name: Movie Recommendation CI/CD

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Machine_Learning Project/05_Advanced Project (AI)/Recommendation System/Movies_Recommendation_System"

    steps:

      # STEP 1 — CHECKOUT REPOSITORY
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 — SETUP PYTHON
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # STEP 3 — INSTALL DOCKER COMPOSE
      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # STEP 4 — BUILD CONTAINERS
      - name: Build Docker Containers
        run: |
          docker compose build

      # STEP 5 — START CONTAINERS
      - name: Start Containers
        run: |
          docker compose up -d

      # STEP 6 — WAIT FOR SERVICES
      - name: Wait For Services
        run: |
          sleep 15

      # STEP 7 — TEST FASTAPI HEALTH
      - name: Test FastAPI API
        run: |
          curl http://localhost:8000

      # STEP 8 — TEST FASTAPI DOCS
      - name: Test FastAPI Docs
        run: |
          curl http://localhost:8000/docs

      # STEP 9 — TEST STREAMLIT
      - name: Test Streamlit
        run: |
          curl http://localhost:8501

      # STEP 10 — VERIFY CONTAINERS RUNNING
      - name: Check Running Containers
        run: |
          docker ps

      # STEP 11 — SHUTDOWN CONTAINERS
      - name: Stop Containers
        run: |
          docker compose down

      # STEP 12 — SUCCESS MESSAGE
      - name: Success
        run: |
          echo "CI/CD pipeline completed successfully"