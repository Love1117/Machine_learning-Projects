name: Movie Recommendation CI/CD

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Machine_Learning Project/05_Advanced Project (AI)/Recommendation System/Music_Recommendation_System"

    steps:

      # STEP 1 — CHECKOUT REPOSITORY
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 — SETUP PYTHON
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # STEP 3 — SETUP DOCKER BUILDX
      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # STEP 4 — VERIFY FILES
      - name: Verify Project Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      # STEP 5 — BUILD CONTAINERS
      - name: Build Docker Containers
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          docker compose build

      # STEP 6 — START CONTAINERS
      - name: Start Containers
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          docker compose up -d

      # STEP 7 — WAIT FOR SERVICES
      - name: Wait For Services
        run: |
          echo "Waiting for containers to fully start..."
          sleep 40

      # STEP 8 — SHOW RUNNING CONTAINERS
      - name: Check Running Containers
        run: |
          docker ps -a

      # STEP 9 — FASTAPI LOGS
      - name: FastAPI Logs
        run: |
          docker compose logs fastapi

      # STEP 10 — STREAMLIT LOGS
      - name: Streamlit Logs
        run: |
          docker compose logs streamlit

      # STEP 11 — FULL DOCKER LOGS
      - name: Full Docker Logs
        run: |
          docker compose logs

      # STEP 12 — TEST FASTAPI ROOT
      - name: Test FastAPI API
        run: |
          curl -v http://localhost:8000

      # STEP 13 — TEST FASTAPI DOCS
      - name: Test FastAPI Docs
        run: |
          curl -v http://localhost:8000/docs

      # STEP 14 — TEST STREAMLIT
      - name: Test Streamlit
        run: |
          curl -v http://localhost:8501

      # STEP 15 — STOP CONTAINERS
      - name: Stop Containers
        if: always()
        run: |
          docker compose down

      # STEP 16 — SUCCESS MESSAGE
      - name: Success
        run: |
          echo "CI/CD pipeline completed successfully"